name: Get (possibly cached) uv/Pre-commit virtualenvs

inputs:
  python-version:
    description: "Python version to use"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Set up Python (specific version)
      if: inputs.python-version != ''
      shell: bash
      run: uv python install ${{ inputs.python-version }}

    - name: Set up Python (default)
      if: inputs.python-version == ''
      shell: bash
      run: uv python install

    - name: Install dependencies
      shell: bash
      run: uv sync --all-groups

    - name: Load cached pre-commit virtualenv
      id: cached-pre-commit
      uses: actions/cache@v4
      with:
        path: ~/.cache/pre-commit
        key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}-${{ hashFiles('.github/actions/uv_cached/action.yml') }}

    - name: Install pre-commit hooks, only if cache wasn't found
      if: steps.cached-pre-commit.outputs.cache-hit != 'true'
      shell: bash
      run: uv run pre-commit install-hooks
