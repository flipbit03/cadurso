name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main, "*" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.11", "3.12", "3.13" ]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Get (possibly cached) uv/Pre-commit virtualenvs
        uses: ./.github/actions/uv_cached
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run Tests
        run: uv run pytest
